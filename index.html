<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKS Kolase Kota Seni</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@100;300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Fallback if Helvetica Neue fails */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');
    </style>
</head>
<body>
    <div class="hero-container">
        <!-- The background city image -->
        <div class="hero-bg"></div>
        <div class="color-overlay"></div>
        
        <!-- Large overlaid geometric shapes -->
        <div class="geometric-shapes">
            <div class="shape thick-red"></div>
            <div class="shape thick-green"></div>
            <div class="shape thick-black"></div>
            <div class="shape light-green-rect"></div>
            <div class="shape pink-line"></div>
        </div>
        
        <header>
            <div class="logo-group">
                <div class="logo-svg">
                    <svg width="160" height="100" viewBox="0 0 160 100">
                        <!-- Custom abstract geometric Logo approximating KKS -->
                        <path d="M 20 20 L 25 70" stroke="#375a9e" stroke-width="12" stroke-linecap="round"/>
                        <path d="M 45 15 L 20 40" stroke="#1cba73" stroke-width="12" stroke-linecap="round"/>
                        <path d="M 23 42 L 55 75" stroke="#7a529e" stroke-width="12" stroke-linecap="round"/>
                        
                        <path d="M 65 50 L 90 15" stroke="#ed6a6a" stroke-width="12" stroke-linecap="round"/>
                        <path d="M 50 70 L 75 35" stroke="#ed6a6a" stroke-width="12" stroke-linecap="round"/>
                        <path d="M 75 45 L 105 75" stroke="#375a9e" stroke-width="12" stroke-linecap="round"/>
                        
                        <path d="M 125 15 L 105 45" stroke="#1cba73" stroke-width="12" stroke-linecap="round"/>
                        <path d="M 105 45 L 135 60" stroke="#1cba73" stroke-width="12" stroke-linecap="round"/>
                        <path d="M 135 60 L 115 90" stroke="#1cba73" stroke-width="12" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>KOLASE<br><span>KOTA SENI</span></h1>
                </div>
            </div>
        </header>
    </div>
    
    <main class="content-section">
        <div class="column col-1">
            <h2>Profile</h2>
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Boards</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
        <div class="column col-2">
            <h2>Main di kampung Cikini</h2>
            <ul>
                <li><a href="#">News</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">Program</a></li>
                <li><a href="#">Library</a></li>
            </ul>
        </div>
        <div class="column col-3">
            <h2>Cakap-cakap</h2>
            <ul>
                <li><a href="#">Publishing</a></li>
                <li><a href="#">Discourse</a></li>
            </ul>
        </div>
    </main>
</body>
</html>
